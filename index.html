<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WillowTree个人网站</title>
        <base href="\">
        <style>
            * {
                color: rgb(225, 225, 225);
                box-sizing: border-box;
                user-select: none;
            }

            body {
                background: rgb(15, 15, 15);
            }

            .HeadLine, .HeadLine * {
                mix-blend-mode: difference;
            }

            @keyframes TitlePanel-Title-Animation {
                0% {
                    left: -15vw;
                    clip-path: inset(0 100% 0 0);
                    opacity: 0;
                }

                100% {
                    left: 0;
                    clip-path: inset(0 0 0 0);
                    opacity: 1;
                }
            }

            @keyframes TitlePanel-Light-Animation {
                0% {
                    right: 0;
                    opacity: 0;
                }

                100% {
                    right: 25vw;
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body style="margin: 0;">
        <div class="HeadLine" style="display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; height: 60px; padding: 25px; z-index: 5;">
            <b>杨柳 WillowTree 个人网站</b>
        </div>
        <div class="ViewBox" style="display: block; position: fixed; top: 0; left: 0; right: 0; bottom: 0; font-size: calc(max(min(1.2vw, 21px), 14px));  overflow-y: scroll;">
            <div class="TitlePanel" style="display: flex; flex-direction: column; align-items: flex-start; justify-content: center; height: 100%; font-size: max(min(1.5vw, 42px), 14px); text-transform: uppercase; padding: 15vw;">
                <div class="TitlePanel-Light" style="position: absolute; right: 25vw; animation: TitlePanel-Light-Animation 5s ease-out;">
                    <div style="width: 5cqw; width: max(15vw, 150px); height: max(15vw, 150px); border-radius: max(15vw, 150px); background: rgb(0, 255, 0); filter: blur(min(max(15vw, 100px), 200px));"></div>
                </div>
                <div class="TitlePanel-Title" style="position: relative; border-left: 10px solid rgb(255, 255, 255); overflow-x: hidden; animation: TitlePanel-Title-Animation 2s cubic-bezier(0, 0, 0.001, 1); padding-left: min(50px, max(2vw, 15px));">
                    <b style="display: block; margin: 10px 0;">Welcome to</b>
                    <h1 style="display: block; margin: 5px 0;"><b>WillowTree's Own Space</b></h1>
                </div>
            </div>
            <div style="padding: 50px 15vw;">
                <h2><b>一个普通的开发者</b></h2>
                <p>喜欢搞各种项目<span style="color: rgb(150, 150, 150); text-decoration: line-through; text-decoration-thickness: 2.5px;">，虽然每个项目最终都会废止</span>。</p>
                <br>
                <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 3.5px; height: min(50vh, 25vw); background: rgba(50, 50, 50, 0.5);">
                    <h1 style="position: absolute; color: rgba(150, 150, 150, 0.2); font-size: 4vw; text-transform: uppercase; margin: 0;">Please Wait</h1>
                    <h1 style="margin: 0;">Fly Through</h2>
                    <b>正在企划中</b>
                </div>
            </div>
        </div>
    </body>
</html>
