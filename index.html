<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WillowTree个人网站</title>
        <style>
            * {
                color: rgb(225, 225, 225);
                user-select: none;
            }

            body {
                background: rgb(15, 15, 15);
            }

            .HeadLine {
                mix-blend-mode: difference;
            }

            @keyframes TitlePanel-Title-Animation {
                0% {
                    left: -15cqw;
                    clip-path: inset(0 100% 0 0);
                    opacity: 0;
                }

                100% {
                    left: 0;
                    clip-path: inset(0 0 0 0);
                    opacity: 1;
                }
            }

            @keyframes TitlePanel-Light-Animation {
                0% {
                    right: 0;
                    opacity: 0;
                }

                100% {
                    right: 25cqw;
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body style="margin: 0;">
        <div class="HeadLine" style="display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; height: max(7cqh, 50px); font-size: max(2cqh, 9px); padding: 0 max(3.5cqh, 25px);">
            <b>杨柳 WillowTree 个人网站</b>
        </div>
        <div class="TitlePanel" style="display: flex; flex-direction: column; align-items: flex-start; justify-content: center; height: 100cqh; font-size: max(min(1.5cqw, 2.5cqh), 14px); text-transform: uppercase; padding: 0 15cqw;">
            <div class="TitlePanel-Light" style="position: absolute; right: 25cqw; animation: TitlePanel-Light-Animation 5s ease-out;">
                <div style="width: 5cqw; width: max(15cqw, 150px); height: max(15cqw, 150px); border-radius: max(15cqw, 150px); background: rgb(0, 255, 0); filter: blur(min(max(15cqw, 100px), 200px));"></div>
            </div>
            <div class="TitlePanel-Title" style="position: relative; border-left: 10px solid rgb(255, 255, 255); overflow-x: hidden; animation: TitlePanel-Title-Animation 2s cubic-bezier(0, 0, 0.001, 1); padding-left: min(50px, max(2cqw, 15px));">
                <b style="display: block; margin: 10px 0;">Welcome to</b>
                <h1 style="display: block; margin: 5px 0;"><b>WillowTree's Own Space</b></h1>
            </div>
        </div>
    </body>
</html>
