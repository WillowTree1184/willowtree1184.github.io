<!DOCTYPE html>
<html>
  <head>
    <title>Willow个人博客网站</title>
    <style>
        html, body{
            z-index: 0;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }
        
        #warn{
            z-index: 1;
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            box-shadow: 0 0 5px black;
            border-radius: 5px;
            background-color: gold;
            text-align: center;
            margin: 0;
            padding: 15px;
        }

        #head{
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 90%;
            background: linear-gradient(45deg, blue, purple);
            background-size: cover;
            margin: 0;
        }
    </style>
  </head>
  <body>
    <p id="warn">该网站正在搭建中</p>

    <div id="head">
    </div>
  </body>
</html>
